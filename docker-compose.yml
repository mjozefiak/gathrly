services:
  postgres:
    image: postgres:16
    container_name: gathrly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gathrly
      POSTGRES_PASSWORD: gathrly
      POSTGRES_DB: gathrly
    ports:
      - '5432:5432'
    volumes:
      - gathrly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gathrly -d gathrly']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gathrly-postgres-data:
