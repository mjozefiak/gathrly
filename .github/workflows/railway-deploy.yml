name: Railway Deploy

on:
  push:
    branches:
      - master

concurrency:
  group: railway-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Railway CLI
        run: npm install -g @railway/cli@3

      - name: Deploy API to production
        run: railway up --ci --service api --environment production

      - name: Deploy Web to production
        run: railway up --ci --service web --environment production

      - name: List API deployments
        run: railway deployment list --service api --environment production --json

      - name: List Web deployments
        run: railway deployment list --service web --environment production --json
